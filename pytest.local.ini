# pytest settings optimized for development cycles.
#
# Differences from pytest.ini:
# - Removing `--cov` makes it possible to scope coverage reports to specific modules.
# - Warnings are ignored.
#
# Example usage:
# ```
# # Test only one file or function without generating coverage.
# pytest -c pytest.local.ini tests/test_enterprise/api/test_throttles.py
# ```
[pytest]
DJANGO_SETTINGS_MODULE = enterprise.settings.test
addopts = --cov-report term-missing -W ignore
norecursedirs = .* docs requirements site-packages scripts node_modules
testpaths = tests
