# .readthedocs.yml
# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required: the version of this file's schema.
version: 2

# uv isn't natively supported by Read the Docs, so drive the whole build
# ourselves via a custom command (RTD's documented escape hatch for tools
# it doesn't integrate with directly). Note: this gives up RTD's native
# fail_on_warning/pdf/epub format support -- -W below replicates
# fail_on_warning, but PDF/EPUB output would need a separate LaTeX-toolchain
# setup that RTD otherwise provisions automatically for the `formats:` key.
build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install uv
    - uv sync --group doc
    - uv run sphinx-build -W -b html docs/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
