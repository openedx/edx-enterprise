[build-system]
requires = ["setuptools", "setuptools-scm>8.1"]
build-backend = "setuptools.build_meta"

[project]
name = "edx-enterprise"
description = "Your project description goes here"
requires-python = ">=3.12"
license = "AGPL-3.0-or-later"
authors = [
    {name = "edX", email = "oscm@edx.org"},
]
keywords = [
    "Django",
    "edx",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: Django",
    "Framework :: Django :: 5.2",
    "Intended Audience :: Developers",
    "Natural Language :: English",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

dynamic = ["readme", "version"]

dependencies = [
    "bleach",
    "celery",
    "code-annotations",
    "cryptography",
    "django-cache-memoize",
    "django-config-models",
    "django-countries",
    "django-crum",
    "django-fernet-fields-v2",
    "django-filter",
    "django-ipware",
    "django-model-utils",
    "django-multi-email-field",
    "django-object-actions",
    "django-simple-history",
    "django-waffle",
    "Django",
    "djangorestframework-xml",
    "djangorestframework",
    "edx-django-utils>=3.12.0",
    "edx-drf-extensions",
    "edx-opaque-keys[django]",
    "edx-rest-api-client",
    "edx-rbac",
    "tincan",
    "edx-toggles",
    "jsondiff",
    "jsonfield",
    "lxml",
    "openedx-atlas",
    "openedx-events",
    "openedx-filters",
    "paramiko",
    "path.py",
    "pillow",
    "python-dateutil",
    "python3-saml",
    "pytz",
    "requests",
    "rules",
    "slumber",
    "social-auth-app-django",
    "stevedore",
    "testfixtures",
    "unicodecsv",
    "PGPy",
    "django-oauth-toolkit",
]

[project.optional-dependencies]
braze = [
    "edx-braze-client",
]

[project.entry-points."lms.djangoapp"]
enterprise = "enterprise.apps:EnterpriseConfig"
consent = "consent.apps:ConsentConfig"

[project.entry-points."cms.djangoapp"]
enterprise = "enterprise.apps:EnterpriseConfig"
consent = "consent.apps:ConsentConfig"

[project.urls]
Homepage = "https://github.com/openedx/edx-enterprise"
Repository = "https://github.com/openedx/edx-enterprise"

[dependency-groups]
test-master = [
    "edx-api-doc-tools",
    "edx-braze-client",
]
test = [
    {include-group = "test-master"},
    "ddt<1.4.0",
    "django-mock-queries",
    "diff-cover",
    "django-model-utils",
    "factory_boy",
    "freezegun",
    "mock",
    "pytest-cov",
    "pytest-django",
    "responses",
    "testfixtures",
]
doc = [
    {include-group = "test-master"},
    "doc8",
    "docutils",
    "pytest",
    "factory-boy",
    "readme_renderer",
    "Sphinx",
    "sphinx-book-theme",
    "build",
    "twine",
]
ci = [
    "tox",
    "tox-uv",
]
js_test = [
    "jaraco.classes",
    "jaraco.collections",
    "jaraco.functools",
    "jasmine",
    "tempora",
]
dev = [
    {include-group = "test-master"},
    {include-group = "doc"},
    {include-group = "test"},
    {include-group = "ci"},
    "edx-lint",
    "edx-i18n-tools",
    "isort",
    "pycodestyle",
    "pydocstyle",
    "wheel",
]

[tool.setuptools]
include-package-data = true

[tool.setuptools.dynamic]
readme = {file = ["README.rst", "CHANGELOG.rst"], content-type = "text/x-rst"}

[tool.setuptools.packages.find]
include = ["enterprise*", "consent*", "integrated_channels*", "enterprise_learner_portal*"]
exclude = ["*tests*"]

[tool.setuptools_scm]
version_scheme = "only-version"
local_scheme = "no-local-version"
fallback_version = "0.0.0.dev0"

[tool.semantic_release]
build_command = "pip install build && SETUPTOOLS_SCM_PRETEND_VERSION=$NEW_VERSION python -m build"

[tool.uv]
# Every `uv sync`/`uv run` invocation in this repo names an explicit --group.
# Without this, uv's implicit default group (named "dev") would be synced *in
# addition* to whatever --group is passed, silently pulling the entire
# dev/test/quality/ci superset into every target, defeating the point of
# having separate groups.
default-groups = []
# js_test (Jasmine JS-test runner) depends on an old jasmine package that
# hard-pins pyyaml far below what test-master/test/doc/dev need (transitively,
# via edx-api-doc-tools -> drf-yasg). Those requirement sets are mutually
# unsatisfiable in one resolution, so give js_test its own resolution fork.
conflicts = [
    [{group = "js_test"}, {group = "test-master"}],
    [{group = "js_test"}, {group = "test"}],
    [{group = "js_test"}, {group = "doc"}],
    [{group = "js_test"}, {group = "dev"}],
]
#  DO NOT EDIT constraint-dependencies DIRECTLY.
