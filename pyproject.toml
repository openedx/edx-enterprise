[tool.edx_lint]
uv_constraints = [
    "factory-boy<4.0",
    # pinning Sphinx 8.x version
    # Sphinx 9.x introduces significant changes and removals compared to Sphinx 8.x,
    # particularly in internal APIs and default behaviors, including a substantial rewrite of the autodoc extension.
    # https://github.com/openedx/edx-enterprise/issues/2494
    "Sphinx>=8.0,<9.0",
    # pylint 4 throws all sorts of errors and warnings at us
    "pylint>=3,<4",
    "astroid>=3,<4",
    # setuptools 82.0.0 removed pkg_resources from its distribution, but twine
    # still imports it -- breaks `twine check` in the docs quality gate.
    "setuptools<82",
]

[tool.isort]
line_length = 120
known_edx = []
known_django = ["django"]
known_djangoapp = ["model_utils"]
known_first_party = ["consent", "enterprise", "enterprise_learner_portal", "integrated_channels"]
include_trailing_comma = true
multi_line_output = 3
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "DJANGO", "DJANGOAPP", "EDX", "FIRSTPARTY", "LOCALFOLDER"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "enterprise.settings.test"
addopts = "--cov enterprise --cov enterprise_learner_portal --cov consent --cov integrated_channels --cov-report term-missing --cov-report xml"
norecursedirs = [".*", "docs", "requirements", "site-packages", "scripts", "node_modules"]
testpaths = ["tests"]
