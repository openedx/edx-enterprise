#  and `requirements/sync_platform_constraints.py` (openedx-platform's own pins),
#  both run as part of `make upgrade`.
#  - GLOBAL constraints: edit edx_lint/files/common_constraints.txt
#  - REPO-SPECIFIC constraints: edit [tool.edx_lint].uv_constraints in this file
#  - PLATFORM constraints: nothing to edit, refreshed live from openedx-platform;
#    fenced below with "begin/end openedx-platform sync" markers so they're
