# keycloak-config-cli configuration for devstack provisioning.
# See https://adorsys.github.io/keycloak-config-cli/installation/

# Target Keycloak instance (Docker hostname on the devstack network).
keycloak.url=http://edx.devstack.keycloak:8080
keycloak.user=admin
keycloak.password=admin

# Directory of realm JSON files to import (mounted into the container at
# /config/).  Every tenant is a separate realm file (keycloak-realms/*.json);
# config-cli imports them all.
import.files.locations=/config

# Enable $(VAR) substitution in the realm JSON so that environment variables
# from keycloak-devstack.env are resolved at import time.  Only SHARED values
# (SP entity id, ACS URL, OIDs) use substitution; per-tenant realm names and
# users are literal in each realm file.
import.var-substitution.enabled=true

# Wait for Keycloak to be healthy before attempting the import.
keycloak.availability-check.enabled=true
