name: Migrations check on mysql8

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: mysql8-migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_migrations:
    name: check migrations
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: ['3.12']

    steps:
    - name: Checkout repo
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system Packages
      run: |
        sudo apt-get update
        sudo apt-get install -y libxmlsec1-dev
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        enable-cache: true

    - name: Ubuntu and sql Versions
      run: |
        lsb_release -a
        mysql -V
    - name: Install Python dependencies
      run: |
        uv sync --group dev
        uv pip uninstall mysqlclient
        uv pip install --no-binary mysqlclient mysqlclient
        uv pip uninstall xmlsec
        uv pip install --no-binary xmlsec xmlsec
    - name: Initiate Services
      run: |
        sudo /etc/init.d/mysql start
    - name: Reset mysql password
      run: |
        cat <<EOF | mysql -h 127.0.0.1 -u root --password=root
          UPDATE mysql.user SET authentication_string = null WHERE user = 'root';
          FLUSH PRIVILEGES;
        EOF
    - name: Run migrations
      env:
        DB_ENGINE: django.db.backends.mysql
        DB_NAME: enterprise
        DB_USER: root
        DB_PASSWORD:
        DB_HOST: localhost
        DB_PORT: 3306
      run: |
        echo "CREATE DATABASE IF NOT EXISTS enterprise;" | sudo mysql -u root
        echo "Running the migrations."
        uv run python manage.py migrate --settings=enterprise.settings.test
        echo "use mysql; select * from user;" | sudo mysql -u root
